services:
  - type: web
    name: bom-v3
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bom-v3-db
          property: connectionString

databases:
  - name: bom-v3-db
    plan: free
